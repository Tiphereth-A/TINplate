src_dir: src
notebook_code_dir: code
notebook_doc_dir: doc
cheatsheet_dir: cheatsheet
test_dir: test
notebook_file: notebook
enable_test: false
generate_test_in_notebook: false
notebook:
  chapters:
    example: Chapter name example
  sections:
    example:
    - helloworld: Section name example
      code_ext: hpp
      test_ext: cpp
cheatsheets:
  example: CS example
  example2: CS example2
default_code_style: common
code_styles:
  C: cpp
  cc: cpp
  cp: cpp
  cpp: cpp
  CPP: cpp
  c++: cpp
  cxx: cpp
  H: cpp
  hh: cpp
  hp: cpp
  h++: cpp
  hpp: cpp
  HPP: cpp
  hxx: cpp
formatting_commands:
  cpp:
  - clang-format
  - -style=file
  - -i
  - ${filename}
